services:
  shopping-list:
    build: .
    ports:
      - "3001:3001"
    environment:
      - APP_ENV=production
      - DISABLE_AUTH=true
      - PORT=3001
      - DB_PATH=/data/shopping.db
    volumes:
      - shopping-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  shopping-data:
